name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: npm install, build, and test
        run: |
          npm ci
          npm run build
      - name: Check formatting
        run: npm run prettier:check
        env:
          CI: true
